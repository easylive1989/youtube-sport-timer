<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Sport Timer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <section id="input-section">
      <div id="input-row">
        <input type="text" id="url-input" placeholder="貼上 YouTube 網址" autocomplete="off" />
        <button id="load-btn">新增</button>
      </div>
      <p id="status-msg"></p>
    </section>

    <section id="player-section" hidden>
      <div id="player-wrapper">
        <div id="youtube-player"></div>
      </div>
      <div id="timer-row">
        <div id="timer-bar">
          <div id="countdown-fill"></div>
        </div>
        <span id="next-beep-label">--</span>
      </div>
      <div id="timer-edit">
        <div id="timer-edit-row">
          <button id="add-current-btn">新增 Timer</button>
          <div id="volume-controls">
            <button id="volume-down-btn">🔈-</button>
            <span id="volume-label">60%</span>
            <button id="volume-up-btn">🔈+</button>
          </div>
        </div>
        <p id="timer-count"></p>
        <ul id="timer-list"></ul>
      </div>
    </section>

    <section id="history-section">
      <h2>歷史紀錄</h2>
      <ul id="history-list"></ul>
    </section>
  </div>

  <div id="flash-overlay" hidden></div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="storage.js"></script>
  <script src="app.js"></script>
</body>
</html>
